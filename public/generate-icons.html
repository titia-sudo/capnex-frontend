<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(id, size) {
  const canvas = document.getElementById(id)
  const ctx = canvas.getContext('2d')
  const r = size * 0.12

  // Fond
  ctx.fillStyle = '#030712'
  ctx.beginPath()
  ctx.roundRect(0, 0, size, size, r)
  ctx.fill()

  // Cercle vert
  ctx.fillStyle = '#10b981'
  ctx.beginPath()
  ctx.arc(size/2, size/2, size * 0.38, 0, Math.PI * 2)
  ctx.fill()

  // Texte CP
  ctx.fillStyle = '#030712'
  ctx.font = `bold ${size * 0.28}px Arial`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('CP', size/2, size/2)

  return canvas.toDataURL('image/png')
}

const url192 = drawIcon('c192', 192)
const url512 = drawIcon('c512', 512)

// Téléchargement automatique
function download(url, name) {
  const a = document.createElement('a')
  a.href = url
  a.download = name
  a.click()
}

download(url192, 'logo.png')
setTimeout(() => download(url512, 'logo.png'), 500)
</script>
</body>
</html>
